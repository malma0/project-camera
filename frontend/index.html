<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#2563eb">
    <title>Аналитика столов</title>

</head>
<body>

        <h1>Аналитика игровых столов</h1>

        <a href="/logout"><button class="btn btn-danger">Выйти</button></a>

</header>

<div class="container">
    <div class="summary" id="summary"></div>
    <div class="section-title">Столы</div>
    <div id="loading" class="loading">Загрузка...</div>
    <div id="tables" class="tables-grid"></div>
</div>

<script src="script.js"></script>

</html>
